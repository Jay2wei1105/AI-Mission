# =============================================================================
# 設備限制條件
# =============================================================================
equipment_constraints:
  # 冰水主機與冰水泵互鎖
  chiller_pump_interlock:
    constraint_id: "chiller_pump_interlock"
    description: "冰水主機開啟時必須有對應冰水泵運轉"
    check_type: "requires"
    check_phase: "precheck"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    required_status: ["chw_pri_pump_01_status", "chw_pri_pump_02_status"]
    severity: "critical"
    applicable_roles: ["primary", "backup"]
    error_code: "E350"
  
  # 冰水主機與冷卻水泵互鎖
  chiller_cw_pump_interlock:
    constraint_id: "chiller_cw_pump_interlock"
    description: "冰水主機開啟時必須有對應冷卻水泵運轉"
    check_type: "requires"
    check_phase: "precheck"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    required_status: ["cw_pump_01_status"]
    severity: "critical"
    applicable_roles: ["primary", "backup"]
    error_code: "E350"
  
  # 冰水主機與冷卻水塔互鎖
  chiller_ct_interlock:
    constraint_id: "chiller_ct_interlock"
    description: "冰水主機開啟時必須有對應冷卻水塔運轉"
    check_type: "requires"
    check_phase: "precheck"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    required_status: ["ct_01_status"]
    severity: "critical"
    applicable_roles: ["primary", "backup"]
    error_code: "E350"
  
  # 冰水出水溫度保護
  chiller_temperature_protection:
    constraint_id: "chiller_temperature_protection"
    description: "冰水出水溫度過低保護（防凍）"
    check_type: "range_check"
    check_phase: "precheck"
    target_column: "chiller_01_chwst"
    min_value: 4.0
    max_value: 15.0
    severity: "critical"
    applicable_roles: ["primary", "backup"]
    error_code: "E350"
  
  # 主機最小運轉時間
  chiller_min_runtime:
    constraint_id: "chiller_min_runtime"
    description: "主機開啟後最少運轉 15 分鐘（防止頻繁啟停）"
    check_type: "sequence"
    check_phase: "optimization"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    min_duration_minutes: 15
    severity: "warning"
    applicable_roles: ["primary", "backup"]
    error_code: "E355"
  
  # 主機最小停機時間
  chiller_min_downtime:
    constraint_id: "chiller_min_downtime"
    description: "主機關閉後最少停機 10 分鐘（壓縮機保護）"
    check_type: "sequence"
    check_phase: "optimization"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    min_duration_minutes: 10
    severity: "warning"
    applicable_roles: ["primary", "backup"]
    error_code: "E355"
  
  # 主機與備用主機互斥
  chiller_mutual_backup:
    constraint_id: "chiller_mutual_backup"
    description: "主機與備用主機不可同時開啟（依案場策略）"
    check_type: "mutex"
    check_phase: "optimization"
    trigger_status: ["chiller_01_status", "chiller_02_status"]
    severity: "warning"
    applicable_roles: ["backup"]
    error_code: "E354"
